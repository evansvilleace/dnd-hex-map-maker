<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Region Map Exporter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ee; color: #1a1a1a; }
  #app { display: flex; flex-direction: column; height: 100vh; padding: 12px; gap: 10px; }

  #map-wrapper { flex: 1; position: relative; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; background: #d6e8f0; min-height: 0; }
  #image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; cursor: grab; }
  #image-container.dragging { cursor: grabbing; }
  #image-container.source-hidden { display: none; }
  #render-canvas { position: absolute; top: 0; left: 0; }

  #leaflet-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #leaflet-map.source-hidden { display: none; }
  #leaflet-hex-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 450; }

  #osm-export-note { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; font-size: 12px; color: #666; z-index: 600; display: none; }
  #osm-export-note.visible { display: block; }

  .source-toggle { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; }
  .source-toggle button { border: none; border-radius: 0; padding: 6px 12px; font-size: 13px; background: #fff; cursor: pointer; }
  .source-toggle button:not(:last-child) { border-right: 1px solid #ccc; }
  .source-toggle button.active { background: #4a90d9; color: #fff; }
  .source-toggle button:hover:not(.active) { background: #f0ede8; }

  #drop-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #888; font-size: 13px; pointer-events: none; background: rgba(245,243,238,0.92); z-index: 5; }
  #drop-overlay.hidden { display: none; }

  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .hex-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 13px; background: #fff; user-select: none; transition: background 0.15s; }
  .hex-toggle:hover { background: #f0ede8; }
  .hex-toggle input { margin: 0; cursor: pointer; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  .swatch-picker { width: 18px; height: 18px; border-radius: 4px; border: 1px solid #ccc; padding: 0; flex-shrink: 0; cursor: pointer; background: none; }
  .custom-mile-input { width: 56px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
  .hex-toggle.custom-toggle { gap: 8px; }
  input[type=number], input[type=range] { font-size: 13px; }
  .mile-input { width: 80px; padding: 6px 8px; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 13px; }
  .zoom-input { width: 100px; }
  label.control-label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; }
  button { font-size: 13px; padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
  button:hover { background: #f0ede8; }
  #exportBtn { margin-left: auto; font-weight: 500; }
  #exportBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 12px; color: #666; }
  .divider { width: 1px; height: 24px; background: #ddd; margin: 0 2px; }
  #upload-btn { border-style: dashed; color: #666; }
  #file-input { display: none; }
  .zoom-val { font-size: 13px; min-width: 36px; color: #555; }
</style>
</head>
<body>
<div id="app">
  <div id="map-wrapper">
    <div id="image-container">
      <canvas id="render-canvas"></canvas>
    </div>
    <div id="leaflet-map" class="source-hidden"></div>
    <div id="drop-overlay" class="hidden">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span>Loading world map...</span>
    </div>
    <div id="osm-export-note">Live map tiles can't be exported (licensing/CORS) — use your browser/OS screenshot tool to capture this view instead.</div>
  </div>

  <div class="controls">
    <input type="file" id="file-input" accept="image/*,.svg">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">&#8593; Upload your own map</button>
    <button id="worldBtn" title="Return to the bundled world map">&#8635; World map</button>
    <div class="source-toggle" title="Bundled map exports cleanly; live tiles show real roads/place names but can't be exported">
      <button id="sourceSvgBtn" class="active">Bundled map</button>
      <button id="sourceOsmBtn">Live tiles (OSM)</button>
    </div>
    <label class="control-label">
      Width:
      <input type="number" class="mile-input" id="mapMiles" value="24901" min="1"> mi
    </label>
    <div class="divider"></div>
    <div id="hexScaleControls" class="controls" style="gap:8px;"></div>
    <div class="divider"></div>

    <label class="control-label">
      Zoom:
      <input type="range" class="zoom-input" id="zoomSlider" min="10" max="800" value="100" step="1">
      <span class="zoom-val" id="zoomVal">100%</span>
    </label>
    <button id="fitBtn">Fit view</button>
    <div class="divider"></div>
    <label class="control-label">
      Align grid:
      <button id="nudgeUp" title="Shift grid up">&#8593;</button>
      <button id="nudgeDown" title="Shift grid down">&#8595;</button>
      <button id="nudgeLeft" title="Shift grid left">&#8592;</button>
      <button id="nudgeRight" title="Shift grid right">&#8594;</button>
    </label>
    <button id="resetAlignBtn">Reset alignment</button>
    <div class="divider"></div>
    <label class="hex-toggle" title="Export the map and the hex grid as two separate PNG files instead of one combined image">
      <input type="checkbox" id="chkSeparateLayers" checked>
      Separate layers
    </label>
    <button id="exportBtn">&#8595; Export PNG</button>
  </div>
  <div class="status" id="status">Loading world map…</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HEX_SCALES = [
  { id: 1,    label: '1 mi',    color: '#e85d4a', alpha: 0.75, width: 1.0 },
  { id: 6,    label: '6 mi',    color: '#e8a23a', alpha: 0.75, width: 1.2 },
  { id: 24,   label: '24 mi',   color: '#3aa0a8', alpha: 0.78, width: 1.3 },
  { id: 60,   label: '60 mi',   color: '#4caf7d', alpha: 0.80, width: 1.5 },
  { id: 360,  label: '360 mi',  color: '#4a90d9', alpha: 0.80, width: 2.0 },
  { id: 3600, label: '3600 mi', color: '#9b59b6', alpha: 0.80, width: 2.5 },
];

// The "custom" scale is a sixth slot whose mile value (id) and label are
// user-editable at runtime, unlike the five fixed presets above. It's kept
// in the same HEX_SCALES array (rather than a separate system) so every
// consumer that already iterates HEX_SCALES — rendering, Leaflet, export,
// legend, nudge-step sizing — picks it up for free with no special-casing.
// Its id starts at a value distinct from every preset; if the user later
// types a mile value that collides with an active preset, the render loop
// naturally draws two identical overlapping grids, which is harmless.
const CUSTOM_SCALE = { id: 12, label: '12 mi', color: '#d45fa0', alpha: 0.78, width: 1.4, isCustom: true };
HEX_SCALES.push(CUSTOM_SCALE);

// The bundled world map ships as world-land.svg alongside this HTML file.
// It's a plain equirectangular projection (lng -> x, lat -> y), built from
// Natural Earth 1:10m land polygons. At equirectangular projection, the
// full image width represents the Earth's circumference at the equator
// (~24,901 miles) — that's the default "Width" value below. If a different
// projection or crop is used, adjust Width to match.
const WORLD_MAP_PATH = 'world-land.svg';
const WORLD_MAP_DEFAULT_MILES = 24901;

const activeScales = new Set([360]);
let mapWidthMiles = WORLD_MAP_DEFAULT_MILES;

// Source bitmap and its true pixel dimensions, used for hex-grid math
// (mile-to-pixel ratios) regardless of source type.
let sourceCanvas = null;
let sourceW = 0, sourceH = 0;
let isWorldMap = true;

// For SVG sources we keep the live vector <img> around (sourceIsSvg=true)
// and re-rasterize it on demand at whatever pixel density the current zoom
// level actually needs — this is what keeps SVG output crisp while zooming,
// instead of zooming into one fixed-resolution bitmap baked at load time.
// Raster (non-SVG) uploads are rasterized once, since they have no higher
// resolution to recover by re-rendering.
let sourceImg = null;
let sourceIsSvg = false;
let sourceAspect = 1;
let lastRasterDensity = 0; // source-pixels-per-screen-pixel last rendered at, to avoid needless re-rasterizing

// View state: pan offset (in source-image pixels, top-left of viewport) and zoom (screen px per source px)
let viewZoom = 1;
let panX = 0, panY = 0;
// Grid nudge offset, in source-image pixels.
let imageNudgeX = 0, imageNudgeY = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let panStartX = 0, panStartY = 0;
let imageLoaded = false;

// Latitude correction for the bundled equirectangular world map (see full
// explanation further down in renderView). This is FROZEN rather than
// recomputed every frame: recalculating it live during an active drag means
// the hex grid visibly grows/shrinks in real time as you pan across
// latitudes — across the world map's full vertical range this swing is
// large (hex radius varies by roughly 3x from high latitudes to the
// equator), which reads as dizzying desync rather than a calm pan. Instead,
// it's only updated at "rest" points: drag end, zoom changes, fit view, and
// initial load — exactly the same idea as the existing frozen position
// anchor pattern, just for scale instead of position.
let frozenLatCorrection = 1;

function computeLatCorrectionForCurrentView() {
  if (!isWorldMap) return 1;
  const wrapper = document.getElementById('map-wrapper');
  const vh = wrapper.clientHeight;
  const viewCenterY = panY + (vh / viewZoom) / 2;
  const latDeg = 90 - (viewCenterY / sourceH) * 180;
  const clampedLat = Math.max(-89.9, Math.min(89.9, latDeg));
  return 1 / Math.cos(clampedLat * Math.PI / 180);
}

function refreshLatCorrection() {
  frozenLatCorrection = computeLatCorrectionForCurrentView();
}

// ===== Live OSM tile mode (Leaflet) =====
// A second, independent map source alongside the canvas/SVG renderer above.
// Ported from an earlier version of this tool that used Leaflet directly,
// which already solved the tricky part: keeping hexes locked to real-world
// coordinates under Web Mercator, where meters-per-pixel depends on
// latitude. Two anchor concepts, same as the canvas renderer's own history:
// a frozen "position anchor" (keeps hex positions stable while panning) and
// a live "scale latitude" (always read from the current viewport center, so
// hex size is accurate for whatever's actually on screen).
//
// Export is intentionally NOT supported in this mode — live tiles are
// cross-origin and either licensing-restricted or CORS-blocked from canvas
// export, which is exactly why this tool moved to a bundled SVG in the
// first place. The export button is disabled while this mode is active;
// the on-screen note points people to a screenshot instead.
const TILE_URL = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>';
const REF_ZOOM = 6;

let mapSource = 'svg'; // 'svg' | 'osm'
let leafletMap = null;
let leafletTileLayer = null;
let leafletHexLayers = {};
let leafletGridAnchorLatLng = null;
let leafletNudgeRefPxX = 0;
let leafletNudgeRefPxY = 0;

function initLeafletMap() {
  if (leafletMap) return;
  leafletMap = L.map('leaflet-map', { center: [35.5, 136], zoom: 6 });
  leafletTileLayer = L.tileLayer(TILE_URL, { attribution: TILE_ATTR, maxZoom: 18 }).addTo(leafletMap);
  leafletMap.on('moveend zoomend', redrawLeafletHexes);
}

function getLeafletAnchor() {
  if (!leafletGridAnchorLatLng) {
    leafletGridAnchorLatLng = leafletMap.getCenter();
  }
  return leafletGridAnchorLatLng;
}

function refreezeLeafletAnchor() {
  leafletGridAnchorLatLng = leafletMap.getCenter();
}

function getLeafletAnchorProjAtZoom(zoom) {
  const anchor = getLeafletAnchor();
  const anchorProjAtRef = leafletMap.project(anchor, REF_ZOOM);
  const nudgedAtRef = L.point(anchorProjAtRef.x + leafletNudgeRefPxX, anchorProjAtRef.y + leafletNudgeRefPxY);
  const nudgedLatLng = leafletMap.unproject(nudgedAtRef, REF_ZOOM);
  return { proj: leafletMap.project(nudgedLatLng, zoom), latLng: nudgedLatLng };
}

function drawLeafletHex(scale) {
  const existing = leafletHexLayers[scale.id];
  if (existing) { leafletMap.removeLayer(existing); leafletHexLayers[scale.id] = null; }
  if (!activeScales.has(scale.id)) return;

  const MILES_TO_METERS = 1609.344;
  const radiusMeters = (scale.id * MILES_TO_METERS) / Math.sqrt(3);

  const zoom = leafletMap.getZoom();
  const anchorResult = getLeafletAnchorProjAtZoom(zoom);
  const anchorProj = anchorResult.proj;

  // Hex SIZE always comes from the live viewport center's latitude, not the
  // frozen anchor — Mercator scale genuinely depends on where you're
  // looking, not on where the grid happened to first get anchored.
  const scaleLat = leafletMap.getCenter().lat;
  const metersPerPixel = 156543.03392 * Math.cos(scaleLat * Math.PI / 180) / Math.pow(2, zoom);
  const radiusPx = radiusMeters / metersPerPixel;
  if (radiusPx < 2) return;

  const hexW = radiusPx * Math.sqrt(3);
  const hexH = radiusPx * 2;
  const rowStep = hexH * 0.75;

  const bounds = leafletMap.getBounds();
  const nwProj = leafletMap.project(bounds.getNorthWest(), zoom);
  const seProj = leafletMap.project(bounds.getSouthEast(), zoom);

  const minX = Math.min(nwProj.x, seProj.x) - anchorProj.x;
  const maxX = Math.max(nwProj.x, seProj.x) - anchorProj.x;
  const minY = Math.min(nwProj.y, seProj.y) - anchorProj.y;
  const maxY = Math.max(nwProj.y, seProj.y) - anchorProj.y;

  const pad = radiusPx * 3;
  const startCol = Math.floor((minX - pad) / hexW) - 1;
  const endCol = Math.ceil((maxX + pad) / hexW) + 1;
  const startRow = Math.floor((minY - pad) / rowStep) - 1;
  const endRow = Math.ceil((maxY + pad) / rowStep) + 1;

  const layer = L.layerGroup();

  for (let row = startRow; row <= endRow; row++) {
    const xOffset = (((row % 2) + 2) % 2 === 0) ? 0 : hexW / 2;
    for (let col = startCol; col <= endCol; col++) {
      const cx = anchorProj.x + col * hexW + xOffset;
      const cy = anchorProj.y + row * rowStep;
      const verts = [];
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i - 30);
        const vx = cx + radiusPx * Math.cos(angle);
        const vy = cy + radiusPx * Math.sin(angle);
        const ll = leafletMap.unproject(L.point(vx, vy), zoom);
        verts.push([ll.lat, ll.lng]);
      }
      L.polygon(verts, { color: scale.color, weight: scale.width, opacity: scale.alpha, fillOpacity: 0, interactive: false }).addTo(layer);
    }
  }
  layer.addTo(leafletMap);
  leafletHexLayers[scale.id] = layer;
}

function redrawLeafletHexes() {
  if (mapSource !== 'osm' || !leafletMap) return;
  const anchor = getLeafletAnchor();
  const center = leafletMap.getCenter();
  const distMiles = leafletMap.distance(anchor, center) / 1609.344;
  if (distMiles > 200) {
    refreezeLeafletAnchor();
    leafletNudgeRefPxX = 0;
    leafletNudgeRefPxY = 0;
  }
  HEX_SCALES.forEach(s => drawLeafletHex(s));
}

function setMapSource(newSource) {
  if (newSource === mapSource) return;
  mapSource = newSource;

  const imageContainer = document.getElementById('image-container');
  const leafletDiv = document.getElementById('leaflet-map');
  const svgBtn = document.getElementById('sourceSvgBtn');
  const osmBtn = document.getElementById('sourceOsmBtn');
  const exportBtn = document.getElementById('exportBtn');
  const osmNote = document.getElementById('osm-export-note');

  if (newSource === 'osm') {
    initLeafletMap();
    imageContainer.classList.add('source-hidden');
    leafletDiv.classList.remove('source-hidden');
    svgBtn.classList.remove('active');
    osmBtn.classList.add('active');
    exportBtn.disabled = true;
    exportBtn.title = 'Export is unavailable for live map tiles — screenshot instead';
    osmNote.classList.add('visible');
    // Leaflet needs a size recalculation since its container was hidden
    // (display:none) while this mode was inactive, which leaves its
    // internal size cache stale.
    setTimeout(() => { leafletMap.invalidateSize(); redrawLeafletHexes(); }, 50);
  } else {
    leafletDiv.classList.add('source-hidden');
    imageContainer.classList.remove('source-hidden');
    osmBtn.classList.remove('active');
    svgBtn.classList.add('active');
    exportBtn.disabled = false;
    exportBtn.title = '';
    osmNote.classList.remove('visible');
    renderView();
  }
}

document.getElementById('sourceSvgBtn').addEventListener('click', () => setMapSource('svg'));
document.getElementById('sourceOsmBtn').addEventListener('click', () => setMapSource('osm'));
// ===== End live OSM tile mode =====

function renderView() {
  if (!imageLoaded) return;

  // For SVG sources, re-rasterize at higher density if the current zoom
  // would otherwise show visible blur — i.e. if screen pixels per source
  // pixel has grown meaningfully past what we last rasterized at. This is
  // what keeps SVG zooming crisp instead of zooming into one fixed bitmap.
  if (sourceIsSvg) {
    const neededDensity = viewZoom;
    if (neededDensity > lastRasterDensity * 1.25 || neededDensity < lastRasterDensity / 2) {
      // Chromium silently fails to paint into canvases beyond roughly 256
      // million pixels (drawImage from an SVG source becomes a no-op rather
      // than throwing), so the resolution cap must stay safely under that —
      // verified directly: 23000x11500 (264M px) works, 24000x12000 (288M
      // px) does not. 22000px width keeps comfortable headroom below the
      // cliff for any aspect ratio.
      const targetW = Math.min(
        Math.round(SVG_RASTER_WIDTH * Math.max(neededDensity, 1) * 1.5),
        22000
      );
      const targetH = Math.round(targetW * sourceAspect);

      // panX/panY/imageNudge are expressed in *source canvas pixels*. Since
      // we're about to change the source canvas's resolution, rescale them
      // by the same factor so the visible viewport and grid alignment don't
      // jump when the re-rasterize happens.
      const scaleFactor = targetW / sourceW;
      const candidatePanX = panX * scaleFactor;
      const candidatePanY = panY * scaleFactor;
      const candidateNudgeX = imageNudgeX * scaleFactor;
      const candidateNudgeY = imageNudgeY * scaleFactor;

      const candidateCanvas = rasterizeAtWidth(sourceImg, targetW, targetH);

      // Defensive check: confirm the rasterize actually produced visible
      // content rather than silently failing, so a future browser's canvas
      // limit (if different from Chromium's) degrades gracefully instead of
      // showing a blank map. getImageData() itself throws on a tainted
      // canvas (e.g. loading a local SVG via file://) — that's a separate,
      // already-known restriction (it's also why export needs http(s) for
      // the bundled world map), not a sign the rasterize failed, so in that
      // case just trust the draw succeeded and continue rather than getting
      // stuck unable to verify.
      let producedContent = true;
      try {
        const checkCtx = candidateCanvas.getContext('2d');
        const checkPixel = checkCtx.getImageData(Math.floor(targetW / 2), Math.floor(targetH / 2), 1, 1).data;
        producedContent = checkPixel[3] > 0 || checkPixel[0] > 0 || checkPixel[1] > 0 || checkPixel[2] > 0;
      } catch (e) {
        // Tainted canvas (file://) — can't verify, assume success.
        producedContent = true;
      }

      if (producedContent) {
        panX = candidatePanX;
        panY = candidatePanY;
        imageNudgeX = candidateNudgeX;
        imageNudgeY = candidateNudgeY;
        sourceCanvas = candidateCanvas;
        sourceW = targetW;
        sourceH = targetH;
        lastRasterDensity = targetW / SVG_RASTER_WIDTH;
      }
      // If it didn't produce content, silently keep the previous (working)
      // sourceCanvas rather than swapping to a blank one.
    }
  }

  const canvas = document.getElementById('render-canvas');
  const wrapper = document.getElementById('map-wrapper');
  const vw = wrapper.clientWidth;
  const vh = wrapper.clientHeight;
  canvas.width = vw;
  canvas.height = vh;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, vw, vh);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const srcVisW = vw / viewZoom;
  const srcVisH = vh / viewZoom;

  // Horizontal tiling: real-world longitude wraps (panning east past Asia
  // continues into the Pacific and back to the Americas), but our source is
  // a single flat image. Rather than reprojecting, just draw extra copies
  // of the source image side by side so panning never reveals empty canvas.
  // Vertical stays unclamped-but-finite since the poles are genuine edges,
  // not a wrap. Only the bundled world map wraps this way — a custom
  // uploaded map (e.g. a hand-drawn regional map) has no reason to repeat.
  if (isWorldMap) {
    // Normalize panX into [0, sourceW) so the math below is well-behaved
    // regardless of how far left/right the user has panned.
    const wrappedPanX = ((panX % sourceW) + sourceW) % sourceW;
    panX += wrappedPanX - panX; // snap panX itself back into range too

    // Figure out which copies of the source image (indexed by integer k,
    // where copy k spans source-x range [k*sourceW, (k+1)*sourceW)) are
    // visible in the current viewport, and draw each one at its correct
    // horizontal offset.
    const firstCopy = Math.floor((panX) / sourceW) - 1;
    const lastCopy = Math.ceil((panX + srcVisW) / sourceW) + 1;

    for (let k = firstCopy; k <= lastCopy; k++) {
      const copyOffsetSrc = k * sourceW; // this copy's left edge, in "infinite" source-x space
      // Intersect this copy's span with the visible window [panX, panX+srcVisW)
      const visLeft = Math.max(panX, copyOffsetSrc);
      const visRight = Math.min(panX + srcVisW, copyOffsetSrc + sourceW);
      if (visRight <= visLeft) continue;

      const srcX = visLeft - copyOffsetSrc; // x within the single source image
      const srcW = visRight - visLeft;
      const destX = (visLeft - panX) * viewZoom;
      const destW = srcW * viewZoom;

      ctx.drawImage(
        sourceCanvas,
        srcX, panY, srcW, srcVisH,
        destX, 0, destW, vh
      );
    }
  } else {
    ctx.drawImage(
      sourceCanvas,
      panX, panY, srcVisW, srcVisH,
      0, 0, vw, vh
    );
  }

  const pxPerMileSource = sourceW / mapWidthMiles;

  // Latitude correction: the bundled SVG is a plain equirectangular
  // (Plate Carrée) projection — x is linear in longitude, so pxPerMileSource
  // above is only accurate at the equator. Real-world distance per degree
  // of longitude shrinks by cos(latitude) away from the equator (a degree
  // of longitude at 35°N covers ~18% less ground than at the equator), so
  // a hex sized with the uniform equatorial ratio reads as visibly too
  // large at higher latitudes — confirmed directly: a hex labeled 360 mi
  // was measuring ~440 real miles across Japan (~35.5°N) before this fix.
  // Only applies to the bundled equirectangular map; custom uploads have no
  // defined projection so they keep the flat, uncorrected ratio.
  //
  // Uses the FROZEN correction (see frozenLatCorrection above), not a live
  // recompute — see that comment for why recomputing every frame during a
  // drag causes a dizzying continuous resize.
  const latCorrection = frozenLatCorrection;

  HEX_SCALES.forEach(scale => {
    if (!activeScales.has(scale.id)) return;
    const radiusSourcePx = (scale.id * pxPerMileSource * latCorrection) / Math.sqrt(3);
    const radiusScreenPx = radiusSourcePx * viewZoom;
    if (radiusScreenPx < 2) return;

    const hexW = radiusScreenPx * Math.sqrt(3);
    const hexH = radiusScreenPx * 2;
    const rowStep = hexH * 0.75;
    const pad = radiusScreenPx * 3;

    const originScreenX = -panX * viewZoom + imageNudgeX * viewZoom;
    const originScreenY = -panY * viewZoom + imageNudgeY * viewZoom;

    ctx.strokeStyle = scale.color;
    ctx.lineWidth = scale.width;
    ctx.globalAlpha = scale.alpha;

    const startCol = Math.floor((-pad - originScreenX) / hexW) - 1;
    const endCol = Math.ceil((vw + pad - originScreenX) / hexW) + 1;
    const startRow = Math.floor((-pad - originScreenY) / rowStep) - 1;
    const endRow = Math.ceil((vh + pad - originScreenY) / rowStep) + 1;

    for (let row = startRow; row <= endRow; row++) {
      const xOffset = (((row % 2) + 2) % 2 === 0) ? 0 : hexW / 2;
      for (let col = startCol; col <= endCol; col++) {
        const cx = originScreenX + col * hexW + xOffset;
        const cy = originScreenY + row * rowStep;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = Math.PI / 180 * (60 * i - 30);
          const vx = cx + radiusScreenPx * Math.cos(angle);
          const vy = cy + radiusScreenPx * Math.sin(angle);
          if (i === 0) ctx.moveTo(vx, vy);
          else ctx.lineTo(vx, vy);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  });
}

const SVG_RASTER_WIDTH = 6000;

function loadImageFromUrl(url, widthMiles, isWorld) {
  document.getElementById('drop-overlay').classList.remove('hidden');
  document.getElementById('status').textContent = 'Loading map…';

  // Use a plain <img> load rather than fetch(): fetch() does not support
  // file:// URLs in Chromium, which matters if someone downloads this repo
  // and opens the HTML file directly instead of serving it over http(s).
  const img = new Image();
  img.onload = () => {
    rasterizeAndSet(img, url.toLowerCase().endsWith('.svg'), widthMiles, isWorld);
  };
  img.onerror = () => {
    document.getElementById('status').textContent =
      'Could not load ' + url + '. Make sure ' + url + ' is in the same folder as this HTML file. ' +
      'If you opened this file directly (file://), some browsers block local SVG loads — try running a ' +
      'local server (e.g. "python3 -m http.server") or hosting this on GitHub Pages instead. You can still upload your own map below.';
    document.getElementById('drop-overlay').classList.add('hidden');
  };
  img.src = url;
}

function loadImageFromFile(file) {
  const isSvg = file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg');
  document.getElementById('drop-overlay').classList.remove('hidden');
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      rasterizeAndSet(img, isSvg, mapWidthMiles, false);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function rasterizeAtWidth(img, targetW, targetH) {
  const off = document.createElement('canvas');
  off.width = targetW;
  off.height = targetH;
  const octx = off.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(img, 0, 0, targetW, targetH);
  return off;
}

function rasterizeAndSet(img, isSvg, widthMiles, isWorld) {
  sourceImg = img;
  sourceIsSvg = isSvg;

  let initialW, initialH;
  if (isSvg) {
    sourceAspect = (img.naturalHeight && img.naturalWidth) ? (img.naturalHeight / img.naturalWidth) : 0.5;
    initialW = SVG_RASTER_WIDTH;
    initialH = Math.round(SVG_RASTER_WIDTH * sourceAspect);
  } else {
    sourceAspect = img.naturalHeight / img.naturalWidth;
    initialW = img.naturalWidth;
    initialH = img.naturalHeight;
  }

  sourceCanvas = rasterizeAtWidth(img, initialW, initialH);
  sourceW = initialW;
  sourceH = initialH;
  lastRasterDensity = 1;
  mapWidthMiles = widthMiles;
  isWorldMap = isWorld;
  imageLoaded = true;

  document.getElementById('mapMiles').value = widthMiles;
  document.getElementById('drop-overlay').classList.add('hidden');

  fitToView();
  updateStatus();
}

function fitToView() {
  if (!imageLoaded) return;
  const wrapper = document.getElementById('map-wrapper');
  const vw = wrapper.clientWidth;
  const vh = wrapper.clientHeight;
  const fitZoom = Math.min(vw / sourceW, vh / sourceH);
  viewZoom = fitZoom;
  panX = 0;
  panY = 0;
  syncZoomSlider();
  refreshLatCorrection();
  renderView();
}

function syncZoomSlider() {
  const pct = Math.round(viewZoom * 100);
  const slider = document.getElementById('zoomSlider');
  slider.value = Math.min(Math.max(pct, slider.min), slider.max);
  document.getElementById('zoomVal').textContent = pct + '%';
}

function setZoomAtPoint(newZoom, screenX, screenY) {
  newZoom = Math.max(0.02, Math.min(newZoom, 40));
  const sourceXAtCursor = panX + screenX / viewZoom;
  const sourceYAtCursor = panY + screenY / viewZoom;
  viewZoom = newZoom;
  panX = sourceXAtCursor - screenX / viewZoom;
  panY = sourceYAtCursor - screenY / viewZoom;
  syncZoomSlider();
  refreshLatCorrection();
  renderView();
}

// --- File input / drag-drop ---
document.getElementById('file-input').addEventListener('change', function() {
  if (this.files[0]) loadImageFromFile(this.files[0]);
});

const wrapper = document.getElementById('map-wrapper');
wrapper.addEventListener('dragover', e => { e.preventDefault(); });
wrapper.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && (file.type.startsWith('image/') || file.name.toLowerCase().endsWith('.svg'))) loadImageFromFile(file);
});

document.getElementById('worldBtn').addEventListener('click', () => {
  loadImageFromUrl(WORLD_MAP_PATH, WORLD_MAP_DEFAULT_MILES, true);
});

// --- Pan / zoom interaction ---
const imageContainer = document.getElementById('image-container');

imageContainer.addEventListener('mousedown', e => {
  if (!imageLoaded) return;
  isDragging = true;
  imageContainer.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = (e.clientX - dragStartX) / viewZoom;
  const dy = (e.clientY - dragStartY) / viewZoom;
  panX = panStartX - dx;
  panY = panStartY - dy;
  renderView();
});
window.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    imageContainer.classList.remove('dragging');
    refreshLatCorrection();
    renderView();
  }
});

imageContainer.addEventListener('wheel', e => {
  if (!imageLoaded) return;
  e.preventDefault();
  const rect = imageContainer.getBoundingClientRect();
  const screenX = e.clientX - rect.left;
  const screenY = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  setZoomAtPoint(viewZoom * factor, screenX, screenY);
}, { passive: false });

let pinchStartDist = null;
let pinchStartZoom = 1;
imageContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    pinchStartZoom = viewZoom;
  } else if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
  }
});
imageContainer.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStartDist) {
    e.preventDefault();
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const rect = imageContainer.getBoundingClientRect();
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
    setZoomAtPoint(pinchStartZoom * (dist / pinchStartDist), midX, midY);
  } else if (e.touches.length === 1 && isDragging) {
    e.preventDefault();
    const dx = (e.touches[0].clientX - dragStartX) / viewZoom;
    const dy = (e.touches[0].clientY - dragStartY) / viewZoom;
    panX = panStartX - dx;
    panY = panStartY - dy;
    renderView();
  }
}, { passive: false });
imageContainer.addEventListener('touchend', () => {
  isDragging = false;
  pinchStartDist = null;
  refreshLatCorrection();
  renderView();
});

document.getElementById('fitBtn').addEventListener('click', fitToView);
window.addEventListener('resize', () => { if (imageLoaded) renderView(); });

document.getElementById('zoomSlider').addEventListener('input', function() {
  if (!imageLoaded) return;
  const wrapper = document.getElementById('map-wrapper');
  const cx = wrapper.clientWidth / 2;
  const cy = wrapper.clientHeight / 2;
  setZoomAtPoint(this.value / 100, cx, cy);
});

document.getElementById('mapMiles').addEventListener('change', function() {
  mapWidthMiles = parseFloat(this.value) || mapWidthMiles;
  renderView();
});

// Builds one toggle row per HEX_SCALES entry into #hexScaleControls: a
// checkbox (drives activeScales, same Set-based mechanism every renderer
// already reads from), a color <input type=color> (writes directly back
// into scale.color, which every renderer reads live off the same object —
// no separate "apply" step needed), and for the custom entry only, a
// number input that overwrites scale.id (the mile value) and scale.label
// in place. Mutating id in place — rather than removing/re-adding a new
// scale object — is what lets activeScales, the nudge-step logic, and the
// legend all keep working unmodified: they all key off whatever scale.id
// currently is, read fresh each render, never cached.
function buildHexScaleControls() {
  const container = document.getElementById('hexScaleControls');
  container.innerHTML = '';

  HEX_SCALES.forEach(s => {
    const row = document.createElement('label');
    row.className = 'hex-toggle' + (s.isCustom ? ' custom-toggle' : '');

    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.id = 'chk' + s.id;
    chk.checked = activeScales.has(s.id);
    row.appendChild(chk);

    const picker = document.createElement('input');
    picker.type = 'color';
    picker.className = 'swatch-picker';
    picker.value = s.color;
    picker.title = 'Grid color for ' + s.label;
    row.appendChild(picker);

    if (s.isCustom) {
      const mileInput = document.createElement('input');
      mileInput.type = 'number';
      mileInput.className = 'custom-mile-input';
      mileInput.min = '0.1';
      mileInput.step = 'any';
      mileInput.value = s.id;
      mileInput.title = 'Custom hex size, in miles';
      row.appendChild(mileInput);
      row.appendChild(document.createTextNode('mi (custom)'));

      mileInput.addEventListener('change', () => {
        const wasActive = activeScales.has(s.id);
        const newMiles = parseFloat(mileInput.value);
        if (!newMiles || newMiles <= 0) { mileInput.value = s.id; return; }
        const oldId = s.id;
        if (wasActive) activeScales.delete(oldId);
        // Remove any stale Leaflet layer keyed under the old mile value —
        // drawLeafletHex looks up/stores layers by scale.id, so once id
        // changes below, the layer under oldId would otherwise never be
        // referenced (and never removed) again.
        if (leafletHexLayers[oldId]) {
          if (leafletMap) leafletMap.removeLayer(leafletHexLayers[oldId]);
          delete leafletHexLayers[oldId];
        }
        s.id = newMiles;
        s.label = newMiles + ' mi';
        chk.id = 'chk' + s.id;
        if (wasActive) activeScales.add(s.id);
        if (mapSource === 'osm') redrawLeafletHexes();
        else renderView();
        updateStatus();
      });
    } else {
      const text = document.createTextNode(s.label);
      row.appendChild(text);
    }

    chk.addEventListener('change', () => {
      if (chk.checked) activeScales.add(s.id);
      else activeScales.delete(s.id);
      if (mapSource === 'osm') redrawLeafletHexes();
      else renderView();
      updateStatus();
    });

    picker.addEventListener('input', () => {
      s.color = picker.value;
      if (mapSource === 'osm') redrawLeafletHexes();
      else renderView();
    });

    container.appendChild(row);
  });
}
buildHexScaleControls();

function updateStatus() {
  const active = HEX_SCALES.filter(s => activeScales.has(s.id)).map(s => s.label);
  const source = isWorldMap ? 'world map' : 'custom map';
  document.getElementById('status').textContent = active.length
    ? 'Active scales: ' + active.join(', ') + ' — ' + source + ', width: ' + mapWidthMiles + ' mi.'
    : 'No hex scales selected.';
}

// --- Grid alignment nudging ---
function getSmallestActiveScale() {
  const active = HEX_SCALES.filter(s => activeScales.has(s.id));
  if (!active.length) return HEX_SCALES[0];
  return active.reduce((a, b) => (a.id < b.id ? a : b));
}

function nudgeGrid(dx, dy) {
  const smallest = getSmallestActiveScale();
  const stepMiles = smallest.id * 0.1;

  if (mapSource === 'osm') {
    // Leaflet nudge is expressed in REF_ZOOM pixel space (see
    // getLeafletAnchorProjAtZoom), not source-image pixels, so the step
    // size needs to be derived from the current viewport's meters-per-pixel
    // at REF_ZOOM rather than from sourceW/mapWidthMiles.
    if (!leafletMap) return;
    const stepMeters = stepMiles * 1609.344;
    const scaleLat = leafletMap.getCenter().lat;
    const metersPerPixelAtRef = 156543.03392 * Math.cos(scaleLat * Math.PI / 180) / Math.pow(2, REF_ZOOM);
    const stepPxAtRef = stepMeters / metersPerPixelAtRef;
    leafletNudgeRefPxX += dx * stepPxAtRef;
    leafletNudgeRefPxY += dy * stepPxAtRef;
    redrawLeafletHexes();
  } else {
    const pxPerMileSource = sourceW / mapWidthMiles;

    // Uses the same frozen correction the display is currently using (see
    // frozenLatCorrection), so a nudge click moves the grid by exactly the
    // amount it visually appears to move, rather than a freshly-recomputed
    // value that might differ slightly from what's on screen.
    imageNudgeX += dx * stepMiles * pxPerMileSource * frozenLatCorrection;
    imageNudgeY += dy * stepMiles * pxPerMileSource * frozenLatCorrection;
    renderView();
  }
}

document.getElementById('nudgeUp').addEventListener('click', () => nudgeGrid(0, -1));
document.getElementById('nudgeDown').addEventListener('click', () => nudgeGrid(0, 1));
document.getElementById('nudgeLeft').addEventListener('click', () => nudgeGrid(-1, 0));
document.getElementById('nudgeRight').addEventListener('click', () => nudgeGrid(1, 0));

document.getElementById('resetAlignBtn').addEventListener('click', () => {
  if (mapSource === 'osm') {
    leafletNudgeRefPxX = 0;
    leafletNudgeRefPxY = 0;
    redrawLeafletHexes();
  } else {
    imageNudgeX = 0;
    imageNudgeY = 0;
    renderView();
  }
});

window.addEventListener('keydown', e => {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowUp') { nudgeGrid(0, -1); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { nudgeGrid(0, 1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { nudgeGrid(-1, 0); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { nudgeGrid(1, 0); e.preventDefault(); }
});

// --- PNG DPI metadata helper ---
function setPngDpi(pngBytes, dpi) {
  const pxPerMeter = Math.round(dpi / 0.0254);
  const data = new Uint8Array(9);
  const dv = new DataView(data.buffer);
  dv.setUint32(0, pxPerMeter);
  dv.setUint32(4, pxPerMeter);
  data[8] = 1;

  const typeBytes = new TextEncoder().encode('pHYs');
  const chunkBody = new Uint8Array(typeBytes.length + data.length);
  chunkBody.set(typeBytes, 0);
  chunkBody.set(data, typeBytes.length);

  const crc = crc32(chunkBody);
  const chunk = new Uint8Array(4 + chunkBody.length + 4);
  const cv = new DataView(chunk.buffer);
  cv.setUint32(0, data.length);
  chunk.set(chunkBody, 4);
  cv.setUint32(4 + chunkBody.length, crc >>> 0);

  const insertAt = 8 + 25;
  const out = new Uint8Array(pngBytes.length + chunk.length);
  out.set(pngBytes.subarray(0, insertAt), 0);
  out.set(chunk, insertAt);
  out.set(pngBytes.subarray(insertAt), insertAt + chunk.length);
  return out;
}

let crcTable = null;
function crc32(bytes) {
  if (!crcTable) {
    crcTable = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      crcTable[n] = c;
    }
  }
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    crc = crcTable[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF);
}

function downloadCanvas(canvas, filename, dpi) {
  return new Promise(resolve => {
    try {
      canvas.toBlob(blob => {
        if (!blob) {
          document.getElementById('status').textContent =
            'Export failed (the browser blocked reading image data). If you opened this file directly ' +
            '(file://), try serving it over http(s) instead.';
          resolve();
          return;
        }
        blob.arrayBuffer().then(buf => {
          const pngWithDpi = setPngDpi(new Uint8Array(buf), dpi);
          const finalBlob = new Blob([pngWithDpi], { type: 'image/png' });
          const url = URL.createObjectURL(finalBlob);
          const link = document.createElement('a');
          link.download = filename;
          link.href = url;
          link.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          resolve();
        });
      }, 'image/png');
    } catch (err) {
      document.getElementById('status').textContent =
        'Export failed: ' + err.message + '. If you opened this file directly (file://), try serving it over http(s) instead.';
      resolve();
    }
  });
}

function drawLegend(ctx, w, baseY, dpiScale) {
  const legendH = Math.round(28 * dpiScale);
  ctx.fillStyle = '#f5f3ee';
  ctx.fillRect(0, baseY, w, legendH);
  const sw = 10 * dpiScale;
  let lx = 8 * dpiScale;
  ctx.font = (11 * dpiScale) + 'px sans-serif';
  HEX_SCALES.filter(s => activeScales.has(s.id)).forEach(s => {
    ctx.fillStyle = s.color;
    ctx.fillRect(lx, baseY + 9 * dpiScale, sw, sw);
    ctx.fillStyle = '#444';
    ctx.fillText(s.label, lx + 14 * dpiScale, baseY + 19 * dpiScale);
    lx += 55 * dpiScale;
  });
  ctx.fillStyle = '#888';
  ctx.font = (10 * dpiScale) + 'px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Map width: ' + mapWidthMiles + ' mi  •  300 ppi  •  current view', w - 8 * dpiScale, baseY + 19 * dpiScale);
  ctx.textAlign = 'left';
  return legendH;
}

document.getElementById('exportBtn').addEventListener('click', function() {
  if (!imageLoaded) return;
  const btn = this;
  btn.textContent = 'Exporting...';
  btn.disabled = true;

  // Loading a local SVG via file:// taints the canvas in Chromium, which
  // blocks toBlob() for any canvas that drew from it. This only affects
  // testing by double-clicking the HTML file directly — serving it over
  // http(s), including GitHub Pages, does not have this restriction.
  if (location.protocol === 'file:' && isWorldMap) {
    document.getElementById('status').textContent =
      'Export of the bundled world map only works when this page is served over http(s) — ' +
      'e.g. via GitHub Pages, or locally with "python3 -m http.server". Opening the file directly ' +
      '(file://) blocks image export for security reasons. Uploading your own map file works fine either way.';
    btn.textContent = '↓ Export PNG';
    btn.disabled = false;
    return;
  }

  const DPI = 300;
  const SCREEN_DPI = 96;
  const dpiScale = DPI / SCREEN_DPI;
  const separateLayers = document.getElementById('chkSeparateLayers').checked;

  const wrapper = document.getElementById('map-wrapper');
  const vw = wrapper.clientWidth;
  const vh = wrapper.clientHeight;
  const exportW = Math.round(vw * dpiScale);
  const exportH = Math.round(vh * dpiScale);
  const exportZoom = viewZoom * dpiScale;

  const mapCanvas = document.createElement('canvas');
  mapCanvas.width = exportW;
  mapCanvas.height = exportH;
  const mctx = mapCanvas.getContext('2d');
  mctx.imageSmoothingEnabled = true;
  mctx.imageSmoothingQuality = 'high';

  const srcVisW = vw / viewZoom;
  const srcVisH = vh / viewZoom;

  if (sourceIsSvg) {
    // Draw straight from the live vector image at full export resolution,
    // rather than through the on-screen raster cache — this guarantees the
    // exported map is as sharp as the export DPI allows, regardless of what
    // zoom level was last cached for on-screen display. The visible region
    // (panX/panY/srcVisW/srcVisH) is expressed in "current sourceCanvas"
    // pixel space, so convert it to the SVG's own native coordinate space
    // (sourceImg.naturalWidth/Height) before drawing.
    const nativeScale = sourceImg.naturalWidth / sourceW;
    mctx.drawImage(
      sourceImg,
      panX * nativeScale, panY * nativeScale,
      srcVisW * nativeScale, srcVisH * nativeScale,
      0, 0, exportW, exportH
    );

    // Safety net: export dimensions stay far below Chromium's ~256M pixel
    // canvas limit in practice, but if a draw ever silently produces nothing
    // (blank/transparent), fall back to the known-good on-screen raster
    // cache rather than shipping a blank export. Wrapped in try/catch since
    // getImageData() itself throws on a tainted canvas; the bundled world
    // map case is already blocked earlier under file://, but this covers
    // any other tainting edge case without crashing the export.
    try {
      const checkPixel = mctx.getImageData(Math.floor(exportW / 2), Math.floor(exportH / 2), 1, 1).data;
      const hasContent = checkPixel[3] > 0 || checkPixel[0] > 0 || checkPixel[1] > 0 || checkPixel[2] > 0;
      if (!hasContent) {
        mctx.clearRect(0, 0, exportW, exportH);
        mctx.drawImage(sourceCanvas, panX, panY, srcVisW, srcVisH, 0, 0, exportW, exportH);
      }
    } catch (e) {
      // Tainted canvas — can't verify; proceed and let the later toBlob()
      // failure (already handled in downloadCanvas) surface the real error.
    }
  } else {
    mctx.drawImage(sourceCanvas, panX, panY, srcVisW, srcVisH, 0, 0, exportW, exportH);
  }

  const gridCanvas = document.createElement('canvas');
  gridCanvas.width = exportW;
  gridCanvas.height = exportH;
  const gctx = gridCanvas.getContext('2d');

  const pxPerMileSource = sourceW / mapWidthMiles;

  // Uses the same frozen correction the display is currently using (see
  // frozenLatCorrection) so the export matches what's on screen exactly,
  // rather than a live recompute that — though harmless here since export
  // is a one-shot action, not a continuous drag — would be redundant with
  // the value already being maintained.
  const latCorrection = frozenLatCorrection;

  const originScreenX = -panX * exportZoom + imageNudgeX * exportZoom;
  const originScreenY = -panY * exportZoom + imageNudgeY * exportZoom;

  HEX_SCALES.forEach(scale => {
    if (!activeScales.has(scale.id)) return;
    const radiusSourcePx = (scale.id * pxPerMileSource * latCorrection) / Math.sqrt(3);
    const radiusScreenPx = radiusSourcePx * exportZoom;
    if (radiusScreenPx < 2) return;

    const hexW = radiusScreenPx * Math.sqrt(3);
    const hexH = radiusScreenPx * 2;
    const rowStep = hexH * 0.75;
    const pad = radiusScreenPx * 3;

    gctx.strokeStyle = scale.color;
    gctx.lineWidth = scale.width * dpiScale;
    gctx.globalAlpha = scale.alpha;

    const startCol = Math.floor((-pad - originScreenX) / hexW) - 1;
    const endCol = Math.ceil((exportW + pad - originScreenX) / hexW) + 1;
    const startRow = Math.floor((-pad - originScreenY) / rowStep) - 1;
    const endRow = Math.ceil((exportH + pad - originScreenY) / rowStep) + 1;

    for (let row = startRow; row <= endRow; row++) {
      const xOffset = (((row % 2) + 2) % 2 === 0) ? 0 : hexW / 2;
      for (let col = startCol; col <= endCol; col++) {
        const cx = originScreenX + col * hexW + xOffset;
        const cy = originScreenY + row * rowStep;
        gctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = Math.PI / 180 * (60 * i - 30);
          const vx = cx + radiusScreenPx * Math.cos(angle);
          const vy = cy + radiusScreenPx * Math.sin(angle);
          if (i === 0) gctx.moveTo(vx, vy);
          else gctx.lineTo(vx, vy);
        }
        gctx.closePath();
        gctx.stroke();
      }
    }
    gctx.globalAlpha = 1;
  });

  if (separateLayers) {
    const legendH = Math.round(28 * dpiScale);

    const mapFinal = document.createElement('canvas');
    mapFinal.width = exportW;
    mapFinal.height = exportH + legendH;
    const mfctx = mapFinal.getContext('2d');
    mfctx.fillStyle = '#f5f3ee';
    mfctx.fillRect(0, exportH, exportW, legendH);
    mfctx.drawImage(mapCanvas, 0, 0);
    drawLegend(mfctx, exportW, exportH, dpiScale);

    const gridFinal = document.createElement('canvas');
    gridFinal.width = exportW;
    gridFinal.height = exportH + legendH;
    const gfctx = gridFinal.getContext('2d');
    gfctx.drawImage(gridCanvas, 0, 0);

    Promise.all([
      downloadCanvas(mapFinal, 'hex-map-layer-300dpi.png', DPI),
      downloadCanvas(gridFinal, 'hex-grid-layer-300dpi.png', DPI)
    ]).then(() => {
      btn.textContent = '↓ Export PNG';
      btn.disabled = false;
    });
  } else {
    const legendH = Math.round(28 * dpiScale);
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = exportW;
    finalCanvas.height = exportH + legendH;
    const fctx = finalCanvas.getContext('2d');
    fctx.fillStyle = '#f5f3ee';
    fctx.fillRect(0, exportH, exportW, legendH);
    fctx.drawImage(mapCanvas, 0, 0);
    fctx.drawImage(gridCanvas, 0, 0);
    drawLegend(fctx, exportW, exportH, dpiScale);

    downloadCanvas(finalCanvas, 'hex-region-map-300dpi.png', DPI).then(() => {
      btn.textContent = '↓ Export PNG';
      btn.disabled = false;
    });
  }
});

// Load the bundled world map on startup.
loadImageFromUrl(WORLD_MAP_PATH, WORLD_MAP_DEFAULT_MILES, true);
</script>
